<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Notifications — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link active" th:href="@{/notifications}">🔔 Notifications</a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="page-container fade-in" style="max-width:720px">
  <div class="page-header">
    <h1 class="page-title">Notifications</h1>
    <form method="post" th:action="@{/notifications/mark-all-read}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-ghost btn-sm">Mark All Read</button>
    </form>
  </div>

  <div th:if="${notifications.empty}" class="card text-center" style="padding:3rem">
    <div style="font-size:3rem;margin-bottom:0.75rem">🔔</div>
    <p style="color:var(--text-muted)">No notifications yet</p>
  </div>

  <div th:each="n : ${notifications}" class="card mb-1"
       th:style="${!n.isRead} ? 'border-color:rgba(0,200,150,0.35)' : ''">
    <div style="display:flex;align-items:flex-start;gap:1rem">
      <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0"
           th:style="${!n.isRead} ? 'background:rgba(0,200,150,0.15)' : 'background:var(--bg-secondary)'">
        <span th:switch="${n.type.name()}">
          <span th:case="'EXPENSE_ADDED'">💸</span>
          <span th:case="'SETTLEMENT_REQUEST'">💰</span>
          <span th:case="'SETTLEMENT_VERIFIED'">✅</span>
          <span th:case="'SETTLEMENT_REJECTED'">❌</span>
          <span th:case="'GROUP_INVITE'">👥</span>
          <span th:case="*">🔔</span>
        </span>
      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
          <span style="font-weight:700;font-size:0.875rem" th:text="${n.title}">Title</span>
          <span th:unless="${n.isRead}" class="badge badge-success" style="font-size:0.65rem">NEW</span>
        </div>
        <p style="font-size:0.83rem;color:var(--text-secondary);margin-bottom:0.25rem" th:text="${n.message}">Message</p>
        <span style="font-size:0.72rem;color:var(--text-muted)"
              th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, HH:mm')}">Time</span>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
