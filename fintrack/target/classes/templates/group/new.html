<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>New Group — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="page-container fade-in" style="max-width:560px">
  <div class="page-header">
    <h1 class="page-title">Create Group</h1>
  </div>
  <div class="card">
    <form method="post" th:action="@{/groups/new}" th:object="${groupForm}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Goa Trip 2025" required/>
        <small th:if="${#fields.hasErrors('name')}" style="color:var(--neon-red);font-size:0.8rem" th:errors="*{name}"></small>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="What is this group for?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select th:field="*{currency}" class="form-control">
          <option value="INR">INR — Indian Rupee</option>
          <option value="USD">USD — US Dollar</option>
          <option value="EUR">EUR — Euro</option>
          <option value="GBP">GBP — British Pound</option>
        </select>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
        <button type="submit" class="btn btn-primary btn-lg">Create Group →</button>
        <a th:href="@{/groups}" class="btn btn-ghost btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
