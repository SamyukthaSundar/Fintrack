<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Groups — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link active" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">🔔 <span id="notifBadge" class="nav-badge" style="display:none">0</span></a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="page-container fade-in">
  <div class="page-header">
    <h1 class="page-title">Your Groups</h1>
    <a th:href="@{/groups/new}" class="btn btn-primary">+ New Group</a>
  </div>
  <div th:if="${successMsg}" class="alert alert-success auto-dismiss">✓ <span th:text="${successMsg}"></span></div>

  <div th:if="${groups.empty}" class="card text-center" style="padding:4rem;">
    <div style="font-size:3.5rem;margin-bottom:1rem">👥</div>
    <h3 style="color:var(--text-secondary)">No groups yet</h3>
    <p style="color:var(--text-muted);margin:0.75rem 0 1.5rem">Split expenses with friends, flatmates, or colleagues</p>
    <a th:href="@{/groups/new}" class="btn btn-primary btn-lg">Create Your First Group</a>
  </div>

  <div class="card-grid" th:unless="${groups.empty}">
    <div th:each="group : ${groups}" class="card" style="cursor:pointer"
         th:onclick="|window.location='/groups/' + ${group.id}|">
      <div class="card-header">
        <div>
          <div class="card-title" th:text="${group.name}">Group</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px"
               th:text="${group.description ?: 'No description'}"></div>
        </div>
        <span class="badge badge-info" th:text="${group.currency}">INR</span>
      </div>
      <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:1rem"
           th:text="'Created ' + ${#temporals.format(group.createdAt, 'dd MMM yyyy')}">Date</div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
        <a th:href="@{/groups/{id}(id=${group.id})}" class="btn btn-secondary btn-sm">Overview</a>
        <a th:href="@{/expenses/group/{id}(id=${group.id})}" class="btn btn-ghost btn-sm">Expenses</a>
        <a th:href="@{/analytics/group/{id}(id=${group.id})}" class="btn btn-ghost btn-sm">Analytics</a>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
