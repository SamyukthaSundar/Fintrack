<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card fade-in" style="max-width:480px;">
    <div class="auth-logo">
      <h1>⚡ FinTrack</h1>
      <p style="color:var(--text-secondary);font-size:0.875rem;margin-top:0.4rem;">Create your account</p>
    </div>

    <form method="post" th:action="@{/auth/register}" th:object="${user}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Saanvi Kakkar" required/>
        <small th:if="${#fields.hasErrors('fullName')}" style="color:var(--neon-red);font-size:0.8rem"
               th:errors="*{fullName}"></small>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" th:field="*{username}" class="form-control" placeholder="saanvi_k" required/>
        <small th:if="${#fields.hasErrors('username')}" style="color:var(--neon-red);font-size:0.8rem"
               th:errors="*{username}"></small>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required/>
        <small th:if="${#fields.hasErrors('email')}" style="color:var(--neon-red);font-size:0.8rem"
               th:errors="*{email}"></small>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 characters" required/>
        <small th:if="${#fields.hasErrors('password')}" style="color:var(--neon-red);font-size:0.8rem"
               th:errors="*{password}"></small>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center;">
        Create Account →
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-secondary)">
      Already have an account? <a th:href="@{/auth/login}" style="color:var(--neon-green)">Login</a>
    </p>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
