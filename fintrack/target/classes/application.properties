# ============================================================
# FinTrack - Collaborative Expense Engine
# Application Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=FinTrack

# ── Database - MySQL ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://mainline.proxy.rlwy.net:32510/railway?useSSL=true&requireSSL=true&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=oasiKVgHXqILMGFzmLTQseinRQLiaDhI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP Connection Pool (PERF: was using default unbounded settings) ──
spring.datasource.hikari.pool-name=FinTrackPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
# Keep-alive ping prevents Railway from dropping idle connections
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
# PERF: disable show-sql in production — writing every query to log is slow
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
# PERF: enable second-level cache (query results)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
# PERF: batch inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# PERF: avoid N+1 — Hibernate stats off in prod
spring.jpa.properties.hibernate.generate_statistics=false

# ── Thymeleaf ─────────────────────────────────────────────
# PERF: enable template cache in production (was false — reloads every request)
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── File Upload (for OCR Bill Scanning) ──────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=${java.io.tmpdir}

# ── Actuator (Admin - Saanvi) ─────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ── App Info ──────────────────────────────────────────────
info.app.name=FinTrack
info.app.description=Collaborative Expense Engine
info.app.version=1.0.0
info.app.team=Saanvi Kakkar, Samyuktha S, Sanika Gupta

# ── Logging ───────────────────────────────────────────────
# PERF: reduce log level in production — DEBUG on every request is noisy and slow
logging.level.com.fintrack=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/fintrack.log