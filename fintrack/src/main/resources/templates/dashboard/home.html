<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link active" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">
      🔔 <span id="notifBadge" class="nav-badge"
               th:text="${unreadCount}" th:style="${unreadCount > 0} ? 'display:inline-flex' : 'display:none'">0</span>
    </a>
    <a class="nav-link" th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">⚙ Admin</a>
    <span class="nav-link" style="color:var(--text-secondary);font-size:0.8rem"
          th:text="'Hi, ' + ${user.fullName.split(' ')[0]}"></span>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="page-container fade-in">
  <!-- Flash messages -->
  <div th:if="${successMsg}" class="alert alert-success auto-dismiss">✓ <span th:text="${successMsg}"></span></div>
  <div th:if="${errorMsg}"   class="alert alert-error auto-dismiss">⚠ <span th:text="${errorMsg}"></span></div>

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p style="color:var(--text-secondary);margin-top:0.25rem" th:text="'Welcome back, ' + ${user.fullName}"></p>
    </div>
    <a th:href="@{/groups/new}" class="btn btn-primary">+ New Group</a>
  </div>

  <!-- Stats Row -->
  <div class="four-col mb-3">
    <div class="stat-card">
      <div class="stat-label">Your Groups</div>
      <div class="stat-value" th:text="${groups.size()}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Notifications</div>
      <div class="stat-value" th:text="${unreadCount}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Account</div>
      <div class="stat-value" style="font-size:1.1rem;text-transform:uppercase" th:text="${user.role}">USER</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Member Since</div>
      <div class="stat-value" style="font-size:1rem"
           th:text="${#temporals.format(user.createdAt, 'MMM yyyy')}">—</div>
    </div>
  </div>

  <!-- Groups Grid -->
  <div class="card-header" style="margin-bottom:1rem;">
    <h2 style="font-size:1.1rem;font-weight:700">Your Groups</h2>
    <a th:href="@{/groups}" class="btn btn-ghost btn-sm">View All →</a>
  </div>

  <div th:if="${groups.empty}" class="card text-center" style="padding:3rem;">
    <div style="font-size:3rem;margin-bottom:1rem">👥</div>
    <h3 style="color:var(--text-secondary);font-weight:500">No groups yet</h3>
    <p style="color:var(--text-muted);margin-top:0.5rem;margin-bottom:1.5rem">Create a group to start tracking expenses</p>
    <a th:href="@{/groups/new}" class="btn btn-primary">Create Your First Group</a>
  </div>

  <div class="card-grid" th:unless="${groups.empty}">
    <div th:each="group : ${groups}" class="card" style="cursor:pointer"
         th:onclick="|window.location='/groups/' + ${group.id}|">
      <div class="card-header">
        <div>
          <div class="card-title" th:text="${group.name}">Group Name</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px"
               th:text="${group.description ?: 'No description'}"></div>
        </div>
        <span class="badge badge-success" th:text="${group.currency}">INR</span>
      </div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
        <a th:href="@{/expenses/group/{id}(id=${group.id})}" class="btn btn-secondary btn-sm">💸 Expenses</a>
        <a th:href="@{/settlements/group/{id}(id=${group.id})}" class="btn btn-ghost btn-sm">✓ Settle</a>
        <a th:href="@{/analytics/group/{id}(id=${group.id})}" class="btn btn-ghost btn-sm">📊 Analytics</a>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
