<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Expense — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <style>
    /* ── Split preview box ── */
    .split-preview-box {
      background: var(--surface-2, rgba(255,255,255,0.04));
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.82rem;
    }
    .split-preview-row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.05));
    }
    .split-preview-row:last-child { border-bottom: none; }
    .split-preview-name { color: var(--text-secondary, #aaa); }
    .split-preview-amt  { color: var(--neon-green, #00c896); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .split-preview-warn { color: #ff6b6b; font-size: 0.78rem; }

    /* ── Participant checkboxes ── */
    .participant-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
    .participant-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      cursor: pointer;
      transition: background 0.15s;
    }
    .participant-item:hover { background: var(--surface-2, rgba(255,255,255,0.04)); }
    .participant-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--neon-green, #00c896); cursor: pointer; }
    .participant-item label { cursor: pointer; font-size: 0.875rem; margin: 0; user-select: none; }

    /* ── Split data rows ── */
    .split-data-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .split-data-row .member-name { font-size: 0.85rem; min-width: 130px; color: var(--text-secondary, #aaa); }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">🔔 <span id="notifBadge" class="nav-badge" style="display:none">0</span></a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="page-container fade-in" style="max-width:860px">
  <div class="page-header">
    <div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem">
        <a th:href="@{/groups}" style="color:var(--text-muted)">Groups</a> /
        <a th:href="@{/expenses/group/{id}(id=${group.id})}" style="color:var(--text-muted)"
           th:text="${group.name}">Group</a> /
      </p>
      <h1 class="page-title">Add Expense</h1>
    </div>
  </div>

  <div th:if="${errorMsg}" class="alert alert-error">⚠ <span th:text="${errorMsg}"></span></div>

  <form method="post"
        th:action="@{/expenses/group/{id}/new(id=${group.id})}"
        enctype="multipart/form-data">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="two-col" style="grid-template-columns:1fr 1fr">

      <!-- ═══ LEFT COLUMN ═══ -->
      <div>
        <!-- OCR Upload Zone -->
        <div class="card mb-2">
          <div class="card-header">
            <span class="card-title">📷 Scan Receipt (OCR)</span>
            <span class="badge badge-info">Tess4J</span>
          </div>
          <div class="ocr-zone" id="ocrZone">
            <input type="file" id="receiptFile" name="receiptFile" accept="image/*,.pdf"/>
            <div class="ocr-icon">🧾</div>
            <p style="color:var(--text-secondary);font-size:0.875rem">Drop receipt image or click to upload</p>
            <p style="color:var(--text-muted);font-size:0.75rem;margin-top:0.25rem">Supports JPG, PNG, PDF</p>
          </div>
          <p id="ocrStatus" style="font-size:0.8rem;margin-top:0.75rem;color:var(--text-muted)"></p>
          <img id="receiptImagePreview" style="max-width:100%;border-radius:8px;margin-top:0.75rem;display:none" alt="Receipt preview"/>
          <div id="ocrPreview" style="margin-top:0.5rem"></div>
        </div>

        <!-- Paid By & Date -->
        <div class="card">
          <div class="form-group">
            <label class="form-label">Paid By</label>
            <select name="paidById" class="form-control" required>
              <option th:each="m : ${members}"
                      th:value="${m.user.id}"
                      th:text="${m.user.fullName}"
                      th:selected="${m.user.id == currentUser.id}">Member</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="expenseDate" class="form-control"
                   th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-control">
              <option th:each="cat : ${categories}"
                      th:value="${cat.name()}"
                      th:text="${cat.name()}">Category</option>
            </select>
          </div>

          <!-- ── Participants ── -->
          <div class="form-group">
            <label class="form-label">Participants
              <small style="color:var(--text-muted);font-weight:400"> — who shares this expense?</small>
            </label>
            <div class="participant-list">
              <div th:each="m : ${members}" class="participant-item">
                <!--
                  IMPORTANT: data-name is read by JS to build the live preview.
                  The checkbox value = user ID is sent as participantIds[].
                -->
                <input type="checkbox"
                       class="participant-checkbox"
                       name="participantIds"
                       th:value="${m.user.id}"
                       th:data-name="${m.user.fullName}"
                       th:id="'participant-' + ${m.user.id}"
                       checked/>
                <label th:for="'participant-' + ${m.user.id}"
                       th:text="${m.user.fullName}">Member</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ RIGHT COLUMN ═══ -->
      <div>
        <div class="card">
          <div class="form-group">
            <label class="form-label">Expense Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Dinner at Pizza Hut" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Additional details..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Total Amount (₹)</label>
            <input type="number" name="totalAmount" id="totalAmount" class="form-control"
                   step="0.01" min="0.01" placeholder="0.00" required/>
          </div>

          <!-- Split Strategy -->
          <div class="form-group">
            <label class="form-label">Split Strategy</label>
            <select name="splitType" id="splitType" class="form-control">
              <option th:each="st : ${splitTypes}" th:value="${st.name()}" th:text="${st.name()}">EQUAL</option>
            </select>
            <small id="splitHint" style="color:var(--text-muted);font-size:0.78rem;margin-top:0.3rem;display:block"></small>
          </div>

          <!-- ── EQUAL: no split data needed ── -->
          <div id="split-equal" class="split-section"></div>

          <!-- ── PERCENTAGE ──
               Each input carries data-user-id so JS can:
               (a) disable it when participant is unchecked
               (b) read its value for the live preview
               The th:name generates splitData[userId] for the server.
          -->
          <div id="split-percentage" class="split-section" style="display:none">
            <label class="form-label">Percentages <small style="color:var(--text-muted)">(must sum to 100)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:85px"
                     step="0.01" min="0" max="100" placeholder="%"
                     disabled/>
            </div>
          </div>

          <!-- ── EXACT ── -->
          <div id="split-exact" class="split-section" style="display:none">
            <label class="form-label">Exact Amounts <small style="color:var(--text-muted)">(₹, must sum to total)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:110px"
                     step="0.01" min="0" placeholder="₹0.00"
                     disabled/>
            </div>
          </div>

          <!-- ── WEIGHTED ── -->
          <div id="split-weighted" class="split-section" style="display:none">
            <label class="form-label">Weights <small style="color:var(--text-muted)">(relative, e.g. 2:1:1)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:85px"
                     step="0.01" min="0.01" value="1"
                     disabled/>
            </div>
          </div>

          <!-- Live preview injected here by JS -->
          <div id="splitPreview"></div>

          <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
            <button type="submit" class="btn btn-primary btn-lg">Add Expense →</button>
            <a th:href="@{/expenses/group/{id}(id=${group.id})}" class="btn btn-ghost btn-lg">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
