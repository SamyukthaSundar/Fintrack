<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title th:text="'Expenses — ' + ${group.name} + ' — FinTrack'">Expenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">🔔 <span id="notifBadge" class="nav-badge" style="display:none">0</span></a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="page-container fade-in">
  <div th:if="${successMsg}" class="alert alert-success auto-dismiss">✓ <span th:text="${successMsg}"></span></div>
  <div th:if="${errorMsg}"   class="alert alert-error auto-dismiss">⚠ <span th:text="${errorMsg}"></span></div>

  <div class="page-header">
    <div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem">
        <a th:href="@{/groups/{id}(id=${group.id})}" style="color:var(--text-muted)" th:text="${group.name}">Group</a> /
      </p>
      <h1 class="page-title">Expenses</h1>
    </div>
    <div style="display:flex;gap:0.75rem">
      <a th:href="@{/expenses/group/{id}/new(id=${group.id})}" class="btn btn-primary">+ Add Expense</a>
      <a th:href="@{/analytics/group/{id}(id=${group.id})}" class="btn btn-ghost">📊 Analytics</a>
    </div>
  </div>

  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Title</th><th>Category</th>
            <th>Paid By</th><th>Amount</th><th>Split</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="e : ${expenses}">
            <td style="color:var(--text-muted);font-size:0.8rem"
                th:text="${#temporals.format(e.expenseDate, 'dd MMM')}">Date</td>
            <td>
              <div style="font-weight:600;font-size:0.875rem" th:text="${e.title}">Title</div>
              <div style="font-size:0.75rem;color:var(--text-muted)" th:text="${e.description ?: ''}"></div>
              <span th:if="${e.receiptImage != null}" style="font-size:0.7rem;color:var(--neon-blue)">🧾 Receipt</span>
            </td>
            <td><span class="badge badge-muted" th:text="${e.category}">CAT</span></td>
            <td style="font-size:0.875rem" th:text="${e.paidBy.fullName}">Name</td>
            <td style="font-family:var(--font-mono);font-weight:700;color:var(--neon-green)"
                th:text="'₹' + ${e.totalAmount.toPlainString()}">₹0</td>
            <td><span class="badge badge-info" th:text="${e.splitType}">EQUAL</span></td>
            <td>
              <!-- Edit/Delete buttons only shown to expense owner -->
              <div th:if="${e.paidBy.id == currentUser.id}" style="display:flex;gap:0.4rem">
                <a th:href="@{/expenses/{id}/edit(id=${e.id})}" class="btn btn-sm btn-ghost" title="Edit">✏️</a>
                <form method="post"
                      th:action="@{/expenses/{id}/delete(id=${e.id})}"
                      style="display:inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="groupId" th:value="${group.id}"/>
                  <button type="submit" class="btn btn-danger btn-sm"
                          data-confirm="Delete this expense?">✕</button>
                </form>
              </div>
              <span th:unless="${e.paidBy.id == currentUser.id}" style="color:var(--text-muted);font-size:0.75rem">—</span>
            </td>
          </tr>
          <tr th:if="${expenses.empty}">
            <td colspan="7" style="text-align:center;color:var(--text-muted);padding:2.5rem">
              No expenses yet — <a th:href="@{/expenses/group/{id}/new(id=${group.id})}"
                                    style="color:var(--neon-green)">add the first one</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
