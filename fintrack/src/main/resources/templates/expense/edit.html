<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'Edit Expense — ' + ${expense.title} + ' — FinTrack'">Edit Expense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <style>
    /* ── Split preview box ── */
    .split-preview-box {
      background: var(--surface-2, rgba(255,255,255,0.04));
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.82rem;
    }
    .split-preview-row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.05));
    }
    .split-preview-row:last-child { border-bottom: none; }
    .split-preview-name { color: var(--text-secondary, #aaa); }
    .split-preview-amt  { color: var(--neon-green, #00c896); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .split-preview-warn { color: #ff6b6b; font-size: 0.78rem; }

    /* ── Participant checkboxes ── */
    .participant-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
    .participant-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      cursor: pointer;
      transition: background 0.15s;
    }
    .participant-item:hover { background: var(--surface-2, rgba(255,255,255,0.04)); }
    .participant-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--neon-green, #00c896); cursor: pointer; }
    .participant-item label { cursor: pointer; font-size: 0.875rem; margin: 0; user-select: none; }

    /* ── Split data rows ── */
    .split-data-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .split-data-row .member-name { font-size: 0.85rem; min-width: 130px; color: var(--text-secondary, #aaa); }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">🔔 <span id="notifBadge" class="nav-badge" style="display:none">0</span></a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="page-container fade-in" style="max-width:860px">
  <div class="page-header">
    <div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem">
        <a th:href="@{/groups}" style="color:var(--text-muted)">Groups</a> /
        <a th:href="@{/expenses/group/{id}(id=${group.id})}" style="color:var(--text-muted)" th:text="${group.name}">Group</a> /
      </p>
      <h1 class="page-title">Edit Expense</h1>
    </div>
  </div>

  <div th:if="${errorMsg}" class="alert alert-error">⚠ <span th:text="${errorMsg}"></span></div>

  <form method="post"
        th:action="@{/expenses/{id}/edit(id=${expense.id})}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="groupId" th:value="${group.id}"/>

    <div class="two-col" style="grid-template-columns:1fr 1fr">

      <!-- ═══ LEFT COLUMN ═══ -->
      <div>
        <div class="card">
          <div class="form-group">
            <label class="form-label">Paid By</label>
            <select name="paidById" class="form-control" required>
              <option th:each="m : ${members}"
                      th:value="${m.user.id}"
                      th:text="${m.user.fullName}"
                      th:selected="${m.user.id == expense.paidBy.id}">Member</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="expenseDate" class="form-control"
                   th:value="${expense.expenseDate}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-control">
              <option th:each="cat : ${categories}"
                      th:value="${cat.name()}"
                      th:text="${cat.name()}"
                      th:selected="${cat == expense.category}">Category</option>
            </select>
          </div>

          <!-- ── Participants ── -->
          <div class="form-group">
            <label class="form-label">Participants
              <small style="color:var(--text-muted);font-weight:400"> — who shares this expense?</small>
            </label>
            <div class="participant-list">
              <div th:each="m : ${members}" class="participant-item">
                <input type="checkbox"
                       class="participant-checkbox"
                       name="participantIds"
                       th:value="${m.user.id}"
                       th:data-name="${m.user.fullName}"
                       th:id="'participant-' + ${m.user.id}"
                       th:checked="${expense.splits.?[user.id == __${m.user.id}__].size() > 0}"/>
                <label th:for="'participant-' + ${m.user.id}"
                       th:text="${m.user.fullName}">Member</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ RIGHT COLUMN ═══ -->
      <div>
        <div class="card">
          <div class="form-group">
            <label class="form-label">Expense Title</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="e.g. Dinner at Pizza Hut" required
                   th:value="${expense.title}"/>
          </div>

          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Additional details..." th:text="${expense.description}"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Total Amount (₹)</label>
            <input type="number" name="totalAmount" id="totalAmount" class="form-control"
                   step="0.01" min="0.01" placeholder="0.00" required
                   th:value="${expense.totalAmount}"/>
          </div>

          <!-- Split Type -->
          <div class="form-group">
            <label class="form-label">Split Strategy</label>
            <select name="splitType" id="splitType" class="form-control">
              <option th:each="st : ${splitTypes}" 
                      th:value="${st.name()}" 
                      th:text="${st.name()}"
                      th:selected="${st == expense.splitType}">EQUAL</option>
            </select>
            <small id="splitHint" style="color:var(--text-muted);font-size:0.78rem;margin-top:0.3rem;display:block"></small>
          </div>

          <!-- EQUAL: no extra UI needed -->
          <div id="split-equal" class="split-section"></div>

          <!-- PERCENTAGE -->
          <div id="split-percentage" class="split-section" style="display:none">
            <label class="form-label">Percentages <small style="color:var(--text-muted)">(must sum to 100)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:85px"
                     step="0.01" min="0" max="100" placeholder="%"
                     disabled/>
            </div>
          </div>

          <!-- EXACT -->
          <div id="split-exact" class="split-section" style="display:none">
            <label class="form-label">Exact Amounts <small style="color:var(--text-muted)">(₹, must sum to total)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:110px"
                     step="0.01" min="0" placeholder="₹0.00"
                     disabled/>
            </div>
          </div>

          <!-- WEIGHTED -->
          <div id="split-weighted" class="split-section" style="display:none">
            <label class="form-label">Weights <small style="color:var(--text-muted)">(relative, e.g. 2:1:1)</small></label>
            <div th:each="m : ${members}"
                 class="split-data-row"
                 th:data-user-id="${m.user.id}">
              <span class="member-name" th:text="${m.user.fullName}">Name</span>
              <input type="number"
                     th:name="'splitData[' + ${m.user.id} + ']'"
                     th:data-user-id="${m.user.id}"
                     class="form-control" style="width:85px"
                     step="0.01" min="0.01" value="1"
                     disabled/>
            </div>
          </div>

          <!-- Live preview injected here by JS -->
          <div id="splitPreview"></div>

          <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
            <button type="submit" class="btn btn-primary btn-lg">Update Expense →</button>
            <a th:href="@{/expenses/group/{id}(id=${group.id})}" class="btn btn-ghost btn-lg">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<script th:src="@{/js/main.js}"></script>

<script>
// Pre-populate split data from existing splits
window.existingSplits = /*[[${expense.splits}]]*/ [];

document.addEventListener('DOMContentLoaded', function() {
    // Pre-fill split data inputs based on existing splits
    if (window.existingSplits) {
        window.existingSplits.forEach(function(split) {
            var userId = split.user.id;
            var amount = split.amount;
            var input = document.querySelector('input[name="splitData[' + userId + ']"]');
            if (input) {
                input.value = amount;
            }
        });
    }
    
    // Trigger split type change to show correct section
    handleSplitTypeChange();
});

// Reuse split strategy logic from main.js if available
function handleSplitTypeChange() {
    var type = document.getElementById('splitType').value;
    ['equal', 'percentage', 'exact', 'weighted'].forEach(function(t) {
        var el = document.getElementById('split-' + t);
        if (el) el.style.display = (t === type.toLowerCase()) ? 'block' : 'none';
    });
    
    // Enable/disable inputs based on split type
    document.querySelectorAll('.split-data-row input').forEach(function(input) {
        input.disabled = (type.toLowerCase() === 'equal');
    });
    
    updateSplitPreview();
}

function updateSplitPreview() {
    var total = parseFloat(document.getElementById('totalAmount').value) || 0;
    var type = document.getElementById('splitType').value;
    var checkboxes = document.querySelectorAll('.participant-checkbox:checked');
    var participants = Array.from(checkboxes).map(function(cb) { return { id: cb.value, name: cb.dataset.name }; });
    
    if (participants.length === 0 || total === 0) {
        document.getElementById('splitPreview').innerHTML = '';
        return;
    }
    
    var previewHtml = '<div class="split-preview-box">';
    previewHtml += '<div style="font-weight:600;margin-bottom:0.5rem">💰 Split Preview (' + type + ')</div>';
    
    var splitMap = {};
    var sum = 0;
    
    if (type === 'EQUAL') {
        var each = total / participants.length;
        participants.forEach(function(p) {
            splitMap[p.id] = each;
            sum += each;
        });
    } else if (type === 'PERCENTAGE') {
        participants.forEach(function(p) {
            var input = document.querySelector('input[name="splitData[' + p.id + ']"]');
            var pct = parseFloat(input?.value) || 0;
            var amt = total * pct / 100;
            splitMap[p.id] = amt;
            sum += amt;
        });
    } else if (type === 'EXACT') {
        participants.forEach(function(p) {
            var input = document.querySelector('input[name="splitData[' + p.id + ']"]');
            var amt = parseFloat(input?.value) || 0;
            splitMap[p.id] = amt;
            sum += amt;
        });
    } else if (type === 'WEIGHTED') {
        var totalWeight = 0;
        participants.forEach(function(p) {
            var input = document.querySelector('input[name="splitData[' + p.id + ']"]');
            totalWeight += parseFloat(input?.value) || 1;
        });
        participants.forEach(function(p) {
            var input = document.querySelector('input[name="splitData[' + p.id + ']"]');
            var weight = parseFloat(input?.value) || 1;
            var amt = total * weight / totalWeight;
            splitMap[p.id] = amt;
            sum += amt;
        });
    }
    
    participants.forEach(function(p) {
        var amt = splitMap[p.id] || 0;
        previewHtml += '<div class="split-preview-row">';
        previewHtml += '<span class="split-preview-name">' + p.name + '</span>';
        previewHtml += '<span class="split-preview-amt">₹' + amt.toFixed(2) + '</span>';
        previewHtml += '</div>';
    });
    
    if (Math.abs(sum - total) > 0.01) {
        previewHtml += '<div class="split-preview-warn">⚠️ Sum (₹' + sum.toFixed(2) + ') ≠ Total (₹' + total.toFixed(2) + ')</div>';
    }
    
    previewHtml += '</div>';
    document.getElementById('splitPreview').innerHTML = previewHtml;
}

// Event listeners
document.getElementById('splitType')?.addEventListener('change', handleSplitTypeChange);
document.getElementById('totalAmount')?.addEventListener('input', updateSplitPreview);
document.querySelectorAll('.participant-checkbox').forEach(function(cb) {
    cb.addEventListener('change', updateSplitPreview);
});
document.querySelectorAll('.split-data-row input').forEach(function(input) {
    input.addEventListener('input', updateSplitPreview);
});
</script>

</body>
</html>
