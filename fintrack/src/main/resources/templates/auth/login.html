<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1>⚡ FinTrack</h1>
      <p style="color:var(--text-secondary);font-size:0.875rem;margin-top:0.4rem;">Collaborative Expense Engine</p>
    </div>

    <div th:if="${errorMsg}" class="alert alert-error auto-dismiss">
      ⚠ <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success auto-dismiss">
      ✓ <span th:text="${successMsg}"></span>
    </div>

    <form method="post" th:action="@{/auth/login}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" name="username" class="form-control" placeholder="your_username" required autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;">
        <input type="checkbox" name="remember-me" id="rememberMe" style="accent-color:var(--neon-green)"/>
        <label for="rememberMe" style="font-size:0.85rem;color:var(--text-secondary);cursor:pointer">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center;">
        Login →
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-secondary)">
      No account? <a th:href="@{/auth/register}" style="color:var(--neon-green)">Register here</a>
    </p>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
