<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Audit Logs — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/admin}">⚙ Admin</a>
    <a class="nav-link active" th:href="@{/admin/audit}">Audit Logs</a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="page-container fade-in">
  <div class="page-header">
    <div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem">
        <a th:href="@{/admin}" style="color:var(--text-muted)">Admin</a> /
      </p>
      <h1 class="page-title">Audit Logs</h1>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <a th:if="${currentPage > 0}"
         th:href="@{/admin/audit(page=${currentPage - 1})}"
         class="btn btn-ghost btn-sm">← Prev</a>
      <span style="font-size:0.8rem;color:var(--text-secondary);padding:0 0.5rem"
            th:text="'Page ' + (${currentPage} + 1)">Page 1</span>
      <a th:if="${!logs.last}"
         th:href="@{/admin/audit(page=${currentPage + 1})}"
         class="btn btn-ghost btn-sm">Next →</a>
    </div>
  </div>

  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Action</th>
            <th>Entity</th>
            <th>IP Address</th>
            <th>Changes</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="log : ${logs.content}">
            <td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted)"
                th:text="${#temporals.format(log.timestamp, 'dd/MM/yyyy HH:mm:ss')}">Time</td>
            <td>
              <div style="font-size:0.875rem;font-weight:600"
                   th:text="${log.user?.username ?: 'system'}">User</div>
            </td>
            <td>
              <span class="badge badge-info" th:text="${log.action}">ACTION</span>
            </td>
            <td style="font-size:0.8rem;color:var(--text-secondary)"
                th:text="${log.entityType + (log.entityId != null ? ' #' + log.entityId : '')}">Entity</td>
            <td style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted)"
                th:text="${log.ipAddress ?: '—'}">IP</td>
            <td style="font-size:0.75rem;color:var(--text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis"
                th:text="${log.newValue ?: '—'}">Value</td>
          </tr>
          <tr th:if="${logs.isEmpty()}">
            <td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">
              No audit logs yet
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
