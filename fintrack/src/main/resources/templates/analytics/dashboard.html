<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'Analytics — ' + ${group.name} + ' — FinTrack'">Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">⚡ FinTrack</a>
  <div class="nav-links">
    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
    <a class="nav-link" th:href="@{/groups}">Groups</a>
    <a class="nav-link" th:href="@{/notifications}">🔔 <span id="notifBadge" class="nav-badge" style="display:none">0</span></a>
    <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="page-container fade-in">
  <div class="page-header">
    <div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem">
        <a th:href="@{/groups/{id}(id=${group.id})}" style="color:var(--text-muted)" th:text="${group.name}">Group</a> /
      </p>
      <h1 class="page-title">Analytics</h1>
    </div>
    <!-- PDF Export (Sanika's feature) -->
    <a th:href="@{/analytics/group/{id}/export/pdf(id=${group.id})}"
       class="btn btn-primary">⬇ Export PDF</a>
  </div>

  <!-- Stats Row -->
  <div class="three-col mb-3">
    <div class="stat-card">
      <div class="stat-label">Total Settlements</div>
      <div class="stat-value" th:text="${settlementStats['total']}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Verified</div>
      <div class="stat-value" style="color:var(--neon-green)" th:text="${settlementStats['verified']}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Verification</div>
      <div class="stat-value" style="color:var(--neon-amber)" th:text="${settlementStats['pending']}">0</div>
    </div>
  </div>

  <div class="two-col">
    <!-- Monthly Bar Chart -->
    <div class="chart-container">
      <div class="chart-title">Monthly Expenses (<span th:text="${year}">2025</span>)</div>
      <canvas id="monthlyChart" height="260"></canvas>
    </div>

    <!-- Category Doughnut Chart -->
    <div class="chart-container">
      <div class="chart-title">Expense by Category</div>
      <canvas id="categoryChart" height="260"></canvas>
    </div>
  </div>

  <!-- Category Table -->
  <div class="card mt-2">
    <div class="card-header"><span class="card-title">Category Breakdown</span></div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Category</th><th>Total (₹)</th></tr></thead>
        <tbody>
          <tr th:each="entry : ${categoryData}">
            <td th:text="${entry.key}">Category</td>
            <td style="font-family:var(--font-mono);color:var(--neon-green)"
                th:text="'₹' + ${entry.value.toPlainString()}">₹0</td>
          </tr>
          <tr th:if="${categoryData.empty}">
            <td colspan="2" style="text-align:center;color:var(--text-muted)">No expense data</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Inject chart data from Thymeleaf into JS -->
<script th:inline="javascript">
  const monthlyLabels = /*[[${monthlyData.keySet()}]]*/ [];
  const monthlyValues = /*[[${monthlyData.values()}]]*/ [];
  const categoryLabels = /*[[${categoryData.keySet()}]]*/ [];
  const categoryValues = /*[[${categoryData.values()}]]*/ [];
</script>
<script th:src="@{/js/main.js}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderMonthlyChart('monthlyChart', monthlyLabels, monthlyValues);
    renderCategoryChart('categoryChart', categoryLabels, categoryValues);
  });
</script>
</body>
</html>
