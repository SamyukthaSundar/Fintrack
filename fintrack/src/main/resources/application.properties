# Server
server.port=8080
spring.application.name=FinTrack

# Database - MySQL
spring.datasource.url=jdbc:mysql://mainline.proxy.rlwy.net:32510/railway?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=oasiKVgHXqILMGFzmLTQseinRQLiaDhI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload (for OCR Bill Scanning)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=${java.io.tmpdir}

# Actuator (Admin - Saanvi)
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# App Info
info.app.name=FinTrack
info.app.description=Collaborative Expense Engine
info.app.version=1.0.0
info.app.team=Saanvi Kakkar, Samyuktha S, Sanika Gupta

# Logging
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/fintrack.log

